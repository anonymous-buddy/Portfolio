<div id="loader-container" class="loader-container">
  <div class="aegis-bg-grid"></div>
  <div class="aegis-scanline"></div>
  
  <div class="aegis-hud">
    <div class="hud-block hud-tl">
      <div class="hud-label">SYS.MEM.ALLOC</div>
      <div class="hud-value" id="hud-mem">0x0000</div>
    </div>
    <div class="hud-block hud-tr">
      <div class="hud-label">NET.UPLINK</div>
      <div class="hud-value" id="hud-net">ESTABLISHING</div>
    </div>
    <div class="hud-block hud-bl">
      <div class="hud-label">SEC.PROTOCOL</div>
      <div class="hud-value" id="hud-sec">AWAITING</div>
    </div>
    <div class="hud-block hud-br">
      <div class="hud-label">DATA.STREAM</div>
      <div class="hud-value" id="hud-data">0.0.0.0</div>
    </div>
  </div>

  <div class="aegis-core" id="aegis-core">
    <svg class="aegis-ring aegis-hex-outer" viewBox="0 0 100 100">
      <polygon points="50 5, 89 27.5, 89 72.5, 50 95, 11 72.5, 11 27.5" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4" stroke-dasharray="10 5" />
    </svg>
    <svg class="aegis-ring aegis-circle-main" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="38" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-dasharray="30 15 5 15 40 10"/>
    </svg>
    <svg class="aegis-ring aegis-reticle" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 12" />
    </svg>
    
    <div class="aegis-center-data">
      <span class="aegis-percent" id="loader-percent">0</span><span class="aegis-percent-sym">%</span>
    </div>
  </div>
  
  <div class="aegis-status-container" id="aegis-status-container">
    <div class="aegis-glitch-text" id="loader-status" data-text="INITIALIZING SYSTEM">INITIALIZING SYSTEM</div>
    <div class="aegis-tracker">
      <div class="aegis-bar-bg"></div>
      <div class="aegis-bar-fill" id="loader-progress"></div>
      <div class="aegis-tracker-brackets left">[</div>
      <div class="aegis-tracker-brackets right">]</div>
    </div>
    <div class="aegis-stage-dots">
      <div class="aegis-dot active" id="stage-0"></div>
      <div class="aegis-dot" id="stage-1"></div>
      <div class="aegis-dot" id="stage-2"></div>
      <div class="aegis-dot" id="stage-3"></div>
    </div>
  </div>
</div>
